services:
  - type: web
    name: vcsoy-results
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # --timeout 120 : marge de sécurité pour les opérations synchrones les
    # plus lourdes (validation de gros fichiers Excel, génération de
    # rapports PPTX). La génération de scénarios par IA tourne en
    # arrière-plan (voir app/scenarios/routes.py, _run_generation) et ne
    # dépend donc plus de ce timeout, aussi longue soit-elle.
    # --max-requests 30 --max-requests-jitter 10 : sur le plan gratuit (peu
    # de mémoire), un worker gunicorn qui traite beaucoup de générations de
    # rapports d'étude à la chaîne (édition à 50 participants) peut ne
    # jamais rendre à l'OS la mémoire momentanément utilisée par un modèle
    # .pptx volumineux. On force un redémarrage périodique du worker
    # (mémoire remise à zéro), sans jamais couper une requête en cours.
    startCommand: "gunicorn wsgi:app --timeout 120 --max-requests 30 --max-requests-jitter 10"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vcsoy-results-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOW_DEV_LOGIN
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"

databases:
  - name: vcsoy-results-db
    plan: free
