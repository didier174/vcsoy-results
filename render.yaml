services:
  - type: web
    name: vcsoy-results
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    # --timeout 600 : la génération de scénarios par IA (recherche web +
    # Claude Sonnet 5) peut prendre plusieurs minutes ; bien au-delà des
    # 30 secondes par défaut de gunicorn.
    startCommand: "gunicorn wsgi:app --timeout 600"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vcsoy-results-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ALLOW_DEV_LOGIN
        value: "0"
      - key: SESSION_COOKIE_SECURE
        value: "1"

databases:
  - name: vcsoy-results-db
    plan: free
